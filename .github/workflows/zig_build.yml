name: Build Zig Qt Project

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: master

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    - name: Download Qt from Release
      run: |
        mkdir -p aarch64-linux-qt-5.15.2
        cd aarch64-linux-qt-5.15.2
        
        curl -L -o aarch64-linux-qt-5.15.2.tar.gz \
          "https://github.com/Redbeanw44602/aarch64-linux-qt-5.15.2/releases/download/5.15.2/aarch64-linux-qt-5.15.2.tar.gz"
        
        tar -xzf aarch64-linux-qt-5.15.2.tar.gz

    - name: Configure xmake
      run: |
        ZIG_EXE=$(which zig)
        TARGET_STR="aarch64-linux-gnu.2.27"

        echo "#!/bin/bash" > zig-cc
        echo "$ZIG_EXE cc -target $TARGET_STR \"\$@\"" >> zig-cc
        
        echo "#!/bin/bash" > zig-c++
        echo "$ZIG_EXE c++ -target $TARGET_STR \"\$@\"" >> zig-c++

        echo "#!/bin/bash" > zig-ar
        echo "$ZIG_EXE ar \"\$@\"" >> zig-ar

        echo "#!/bin/bash" > zig-ranlib
        echo "$ZIG_EXE ranlib \"\$@\"" >> zig-ranlib
        
        chmod +x zig-cc zig-c++ zig-ar zig-ranlib

        export CC="$(pwd)/zig-cc"
        export CXX="$(pwd)/zig-c++"
        export AR="$(pwd)/zig-ar"
        export RANLIB="$(pwd)/zig-ranlib"

        xmake f -y -c \
          --plat=linux \
          --arch=arm64-v8a \
          --toolchain=zig \
          --kind=static \
          --cc="$CC" \
          --cxx="$CXX" \
          --ld="$CXX" \
          --sh="$CXX" \
          --ar="$(pwd)/zig-ar" \
          --ranlib="$(pwd)/zig-ranlib" \
          --qt="$(pwd)/aarch64-linux-qt-5.15.2" \
          --build-platform=YDP02X \
          --target-channel=dev \
          -m debug \
          -vD

    - name: Build Project
      run: xmake build -v
