name: Build Zig Qt Project

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v2
      with:
        version: master

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    - name: Download Qt from Release
      run: |
        mkdir -p aarch64-linux-qt-5.15.2
        cd aarch64-linux-qt-5.15.2
        
        curl -L -o aarch64-linux-qt-5.15.2.tar.gz \
          "https://github.com/Redbeanw44602/aarch64-linux-qt-5.15.2/releases/download/5.15.2/aarch64-linux-qt-5.15.2.tar.gz"
        
        tar -xzf aarch64-linux-qt-5.15.2.tar.gz

    - name: Configure xmake
      run: |
        ZIG_EXE=$(which zig)
        TARGET_STR="aarch64-linux-gnu.2.27"

        mkdir -p my-toolchain
        
        echo "#!/bin/bash" > my-toolchain/target-cc
        echo "$ZIG_EXE cc -target $TARGET_STR \"\$@\"" >> my-toolchain/target-cc
        
        echo "#!/bin/bash" > my-toolchain/target-cxx
        echo "$ZIG_EXE c++ -target $TARGET_STR \"\$@\"" >> my-toolchain/target-cxx
        
        echo "#!/bin/bash" > my-toolchain/target-ar
        echo "$ZIG_EXE ar \"\$@\"" >> my-toolchain/target-ar
        
        echo "#!/bin/bash" > my-toolchain/target-ranlib
        echo "$ZIG_EXE ranlib \"\$@\"" >> my-toolchain/target-ranlib
        
        chmod +x my-toolchain/*

        CC_PATH=$(pwd)/my-toolchain/target-cc
        CXX_PATH=$(pwd)/my-toolchain/target-cxx
        AR_PATH=$(pwd)/my-toolchain/target-ar
        RANLIB_PATH=$(pwd)/my-toolchain/target-ranlib

        xmake f -y -c \
          --plat=linux \
          --arch=arm64-v8a \
          --toolchain=zig \
          --cc="$CC_PATH" \
          --cxx="$CXX_PATH" \
          --ld="$CXX_PATH" \
          --sh="$CXX_PATH" \
          --ar="$AR_PATH" \
          --ranlib="$RANLIB_PATH" \
          --kind=static \
          --qt="$(pwd)/aarch64-linux-qt-5.15.2" \
          --build-platform=YDP02X \
          --target-channel=dev \
          -m debug \
          -vD

    - name: Build Project
      run: xmake build -v
